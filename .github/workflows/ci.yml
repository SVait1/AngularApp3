name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # -----------------------------
    # Angular build
    # -----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Angular dependencies
      working-directory: angularapp3.client
      run: npm install

    - name: Build Angular (production)
      working-directory: angularapp3.client
      run: npm run build -- --configuration production

    # -----------------------------
    # .NET build
    # -----------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore .NET dependencies
      working-directory: AngularApp3.Server
      run: dotnet restore

    - name: Build .NET backend
      working-directory: AngularApp3.Server
      run: dotnet publish -c Release -o out

    # -----------------------------
    # Docker build & push
    # -----------------------------
    - name: Convert owner to lowercase
      run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: docker build -t ghcr.io/${OWNER_LC}/angularapp3:latest angularapp3.client

    - name: Push Docker image
      run: docker push ghcr.io/${OWNER_LC}/angularapp3:latest
